# =====================================================================
# Build DreamSoule/ollvm17 (LLVM 17.0.6 + obfuscation passes) for Windows
# Output: a portable clang+lld toolchain drop-in for Android NDK r26
#
# Obfuscation flags you can pass to clang (-mllvm -<flag>):
#   -mllvm -fla -mllvm -bcf -mllvm -bcf_prob=80 -mllvm -bcf_loop=3
#   -mllvm -sobf -mllvm -icall -mllvm -ibr -mllvm -igv
#   -mllvm -sub -mllvm -sub_loop=3 -mllvm -split -mllvm -split_num=5
#   -mllvm -fncmd   (enable function-name control: e.g. function_fla_bcf_())
# =====================================================================
name: Build OLLVM17 (Windows, for Android NDK r26)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Building clang+lld is heavy; raise the job cap. GHA max is 360 min.
# Typical run time on windows-latest is ~1.5 to 3 hours.
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ---------------------------------------------------------------
      # 0. Checkout (so the workflow file itself is in the workspace)
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. Set up MSVC developer environment (cl.exe + env)
      # ---------------------------------------------------------------
      - name: Set up MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------------------------------------------------------------
      # 2. Make sure Ninja is available (GHA windows images ship it,
      #    this is just a safety net)
      # ---------------------------------------------------------------
      - name: Ensure Ninja
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ninja >/dev/null 2>&1; then
            choco install ninja -y --no-progress
          fi
          ninja --version || true
          cmake --version

      # ---------------------------------------------------------------
      # 3. Download & extract official LLVM 17.0.6 monorepo source
      # ---------------------------------------------------------------
      - name: Download LLVM 17.0.6 source
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/llvm-project-17.0.6.src.tar.xz"
          curl -L --fail -o llvm.src.tar.xz "$URL"
          # Some clang test fixtures contain symlinks to files that don't
          # exist in the tarball; on Windows tar cannot create those and
          # exits non-zero. The test fixtures are NOT needed for the build
          # (tests are disabled below), so exclude them outright and strip
          # the warning noise. We then verify the source dirs we actually
          # use are present.
          tar -xJf llvm.src.tar.xz \
            --exclude='llvm-project-17.0.6.src/clang/test/Driver/Inputs/basic_cross_linux_tree' \
            --exclude='llvm-project-17.0.6.src/clang/test/Driver/Inputs/multilib_32bit_linux_tree' \
            --exclude='llvm-project-17.0.6.src/clang/test/Driver/Inputs/multilib_64bit_linux_tree' \
            || true
          # Verify the pieces we actually build from are intact.
          test -d llvm-project-17.0.6.src/llvm          || { echo "MISSING llvm/"; exit 1; }
          test -d llvm-project-17.0.6.src/clang         || { echo "MISSING clang/"; exit 1; }
          test -d llvm-project-17.0.6.src/lld           || { echo "MISSING lld/"; exit 1; }
          test -f llvm-project-17.0.6.src/llvm/CMakeLists.txt \
            || { echo "MISSING llvm/CMakeLists.txt"; exit 1; }
          echo "OK: LLVM source tree extracted (symlink test fixtures skipped)"
          ls -d llvm-project-17.0.6.src/llvm

      # ---------------------------------------------------------------
      # 4. Clone DreamSoule/ollvm17 (already-patched PassBuilder.cpp,
      #    CMakeLists.txt and the Obfuscation/ folder)
      # ---------------------------------------------------------------
      - name: Clone DreamSoule/ollvm17
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/DreamSoule/ollvm17 ollvm17
          ls ollvm17/llvm-project/llvm/lib/Passes/Obfuscation | head

      # ---------------------------------------------------------------
      # 5. Overlay the obfuscation files onto the official source tree.
      #    NOTE: do NOT manually edit PassBuilder.cpp or CMakeLists.txt;
      #    the fork ships them already patched. Just copy them in.
      # ---------------------------------------------------------------
      - name: Overlay obfuscation files
        shell: bash
        run: |
          set -euo pipefail
          SRC="ollvm17/llvm-project/llvm/lib/Passes"
          DST="llvm-project-17.0.6.src/llvm/lib/Passes"
          cp -rf "$SRC"/. "$DST"/
          echo "---- Obfuscation folder now in place ----"
          ls "$DST/Obfuscation"
          echo "---- Sanity: PassBuilder.cpp contains the callback ----"
          grep -c "registerPipelineStartEPCallback" "$DST/PassBuilder.cpp" || true
          grep -c "Obfuscation/BogusControlFlow.h"     "$DST/PassBuilder.cpp" || true
          echo "---- Sanity: CMakeLists lists Obfuscation sources ----"
          grep -c "Obfuscation/StringEncryption.cpp"   "$DST/CMakeLists.txt" || true

      # ---------------------------------------------------------------
      # 6. Apply the getBasicBlockList() private fix for 17.0.6
      #    The obfuscation code calls Function::getBasicBlockList(),
      #    which is private in LLVM 17. Comment the nearest preceding
      #    `private:` so the member falls back to public visibility.
      #    (Per DreamSoule's own patch notes.)
      # ---------------------------------------------------------------
      - name: Patch getBasicBlockList visibility
        shell: bash
        run: |
          set -euo pipefail
          if command -v python3 >/dev/null 2>&1; then PY=python3
          elif command -v python >/dev/null 2>&1; then PY=python
          else echo "No python"; exit 1; fi

          FH="llvm-project-17.0.6.src/llvm/include/llvm/IR/Function.h"
          cat > /tmp/patch_fnh.py <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          text = p.read_text(encoding="utf-8", errors="replace")
          lines = text.splitlines(True)
          # find a line that declares getBasicBlockList
          idx = None
          for i, ln in enumerate(lines):
              if "getBasicBlockList" in ln:
                  idx = i; break
          if idx is None:
              print("getBasicBlockList not found; nothing to patch")
              sys.exit(0)
          # walk upward to nearest standalone 'private:' specifier
          target = None
          for j in range(idx-1, -1, -1):
              s = lines[j].strip()
              if s == "private:":
                  target = j; break
              if s == "public:" or s == "protected:":
                  break  # already public/protected above it
          if target is None:
              print("No preceding private: to comment (already public)")
              sys.exit(0)
          lines[target] = lines[target].replace("private:", "// private: (commented for OLLVM17)")
          p.write_text("".join(lines), encoding="utf-8")
          print(f"Commented private: at line {target+1} (above getBasicBlockList at line {idx+1})")
          PY
          "$PY" /tmp/patch_fnh.py "$FH"
          grep -n "getBasicBlockList\|private: (commented" "$FH" | head

      # ---------------------------------------------------------------
      # 7. Configure CMake (Ninja + MSVC). Source dir = the llvm/ subdir
      #    of the monorepo; clang and lld are pulled in as sibling
      #    projects via LLVM_ENABLE_PROJECTS.
      # ---------------------------------------------------------------
      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail
          export MSYS2_ARG_CONV_EXCL="*"
          DIST="$GITHUB_WORKSPACE/ollvm-dist"
          cmake -S llvm-project-17.0.6.src/llvm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$DIST" \
            -DCMAKE_C_FLAGS="/utf-8" \
            -DCMAKE_CXX_FLAGS="/utf-8" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INSTALL_TOOLCHAIN_ONLY=ON \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_ENABLE_PLUGINS=OFF

      # ---------------------------------------------------------------
      # 8. Build & install (only the toolchain: clang, lld, headers)
      # ---------------------------------------------------------------
      - name: Build & install toolchain
        shell: bash
        run: |
          set -euo pipefail
          N="${NUMBER_OF_PROCESSORS:-2}"
          echo "Building with $N parallel jobs..."
          cmake --build build --target install --parallel "$N" -- --verbose || \
            cmake --build build --target install --parallel "$N"
          echo "---- Installed toolchain ----"
          ls -R "$GITHUB_WORKSPACE/ollvm-dist/bin" | head -50

      # ---------------------------------------------------------------
      # 9. Package the installed toolchain into a zip
      # ---------------------------------------------------------------
      - name: Package toolchain
        shell: pwsh
        run: |
          $dst = "$env:GITHUB_WORKSPACE\ollvm-dist"
          $zip = "$env:GITHUB_WORKSPACE\ollvm17-17.0.6-windows-x86_64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          7z a -tzip -mx=5 "$zip" "$dst\*"
          Write-Host "Zip created: $zip"
          Get-Item "$zip" | Select-Object FullName,Length

      # ---------------------------------------------------------------
      # 10. Upload the artifact
      # ---------------------------------------------------------------
      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm17-17.0.6-windows-x86_64
          path: ollvm17-17.0.6-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------
  # How to use the artifact with Android Studio + NDK r26:
  #   1. Download the zip from the workflow run, extract it.
  #   2. In your NDK r26 install, back up and replace the binaries in:
  #        <NDK>/toolchains/llvm/prebuilt/windows-x86_64/bin/
  #      with clang.exe, clang++.exe, ld.lld, lld-link, etc. from the zip.
  #      (NDK r26 ships clang 17.0.2; this 17.0.6 build is ABI-compatible
  #       for cross-compiling to Android.)
  #   3. Add obfuscation flags in your build.gradle(cmake/ndk) via
  #      C/C++ -> Command Line, e.g.:
  #        -mllvm -fla -mllvm -bcf -mllvm -bcf_prob=80 -mllvm -bcf_loop=3
  #        -mllvm -sobf -mllvm -icall -mllvm -ibr -mllvm -igv
  #        -mllvm -sub -mllvm -sub_loop=3 -mllvm -split -mllvm -split_num=5
  #   4. For per-function control use annotation:
  #        __attribute__((annotate("fla bcf sub split ibr icall igv"))) void f(){...}
  #        __attribute__((annotate("nofla nobcf"))) void g(){...}
  # -----------------------------------------------------------------
