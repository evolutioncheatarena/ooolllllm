      # ============================================
      # STEP 5: Register passes in LLVM
      # ============================================
      - name: Register OLLVM passes
        shell: bash
        run: |
          set -euo pipefail
          cd llvm-project
          
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          elif command -v python >/dev/null 2>&1; then
            PY=python
          else
            echo "❌ No Python interpreter found on PATH"
            exit 1
          fi
          
          # Create CMakeLists for Obfuscation
          cat > llvm/lib/Transforms/Obfuscation/CMakeLists.txt << 'EOF'
          add_llvm_component_library(LLVMObfuscation
            BogusControlFlow.cpp Flattening.cpp Substitution.cpp StringObfuscation.cpp
            LINK_COMPONENTS Core Support TransformUtils
          )
          EOF
          
          # Add Obfuscation subdirectory to parent CMakeLists
          grep -q "add_subdirectory(Obfuscation)" llvm/lib/Transforms/CMakeLists.txt || \
            echo "add_subdirectory(Obfuscation)" >> llvm/lib/Transforms/CMakeLists.txt
          grep -q "add_subdirectory(Obfuscation)" llvm/lib/Transforms/CMakeLists.txt || \
            { echo "❌ Failed to register Obfuscation subdirectory"; exit 1; }
          
          # Add LLVMObfuscation to Passes CMakeLists (use sed, more robust)
          PASSES_CMAKE="llvm/lib/Passes/CMakeLists.txt"
          if ! grep -q "LLVMObfuscation" "$PASSES_CMAKE"; then
            sed -i '/LLVMTransformUtils/ a\  LLVMObfuscation' "$PASSES_CMAKE"
            grep -q "LLVMObfuscation" "$PASSES_CMAKE" || { echo "❌ Failed to add LLVMObfuscation to Passes CMakeLists"; exit 1; }
          fi
          
          # Patch PassBuilder.cpp
          PASSBUILDER="llvm/lib/Passes/PassBuilder.cpp"
          
          # Add includes
          if ! grep -q "BogusControlFlow.h" "$PASSBUILDER"; then
            "$PY" -c 'from pathlib import Path; path=Path("llvm/lib/Passes/PassBuilder.cpp"); text=path.read_text(); anchor="#include \"llvm/Transforms/Scalar/LICM.h\"\n"; insert="#include \"llvm/Transforms/Obfuscation/BogusControlFlow.h\"\n#include \"llvm/Transforms/Obfuscation/Flattening.h\"\n#include \"llvm/Transforms/Obfuscation/Substitution.h\"\n#include \"llvm/Transforms/Obfuscation/StringObfuscation.h\"\n"; path.write_text(text.replace(anchor, anchor + insert, 1)) if anchor in text and "BogusControlFlow.h" not in text else None'
            grep -q "BogusControlFlow.h" "$PASSBUILDER" || { echo "❌ Failed to add Obfuscation includes"; exit 1; }
          fi
          
          # Add function pass registrations (bcf, fla, sub)
          if ! grep -q 'FUNCTION_PASS("bcf", BogusControlFlow())' "$PASSBUILDER"; then
            "$PY" -c 'from pathlib import Path; path=Path("llvm/lib/Passes/PassBuilder.cpp"); text=path.read_text(); anchor="  FUNCTION_PASS(\"loop-unroll\", LoopUnrollPass())\n"; insert="  FUNCTION_PASS(\"bcf\", BogusControlFlow())\n  FUNCTION_PASS(\"fla\", Flattening())\n  FUNCTION_PASS(\"sub\", Substitution())\n"; path.write_text(text.replace(anchor, anchor + insert, 1)) if anchor in text and "FUNCTION_PASS(\"bcf\", BogusControlFlow())" not in text else None'
            grep -q '"bcf"' "$PASSBUILDER" || { echo "❌ Failed to register bcf/fla/sub function passes"; exit 1; }
          fi
          
          # Add module pass registration (sobf)
          if ! grep -q 'MODULE_PASS("sobf", StringObfuscation())' "$PASSBUILDER"; then
            "$PY" -c 'from pathlib import Path; path=Path("llvm/lib/Passes/PassBuilder.cpp"); text=path.read_text(); anchor="  MODULE_PASS(\"verify\", VerifierPass())\n"; insert="  MODULE_PASS(\"sobf\", StringObfuscation())\n"; path.write_text(text.replace(anchor, anchor + insert, 1)) if anchor in text and "MODULE_PASS(\"sobf\", StringObfuscation())" not in text else None'
            grep -q '"sobf"' "$PASSBUILDER" || { echo "❌ Failed to register sobf module pass"; exit 1; }
          fi
          
          echo "✅ All passes registered"
          echo ""
          echo "Verification:"
          grep -c "BogusControlFlow\|Flattening\|Substitution\|StringObfuscation" "$PASSBUILDER"
          grep '"bcf"\|"fla"\|"sub"\|"sobf"' "$PASSBUILDER"
